{% extends "base.html" %}
{% block title %}KoreComms — Compose{% endblock %}

{% block content %}
<div class="section-title">Inject Manual Message</div>
<p class="meta" style="margin-bottom:1rem;">
  Creates a synthetic inbound message via the Manual interface and places it on the agent queue.
</p>

<div class="panel" style="max-width:680px;">
  <div class="panel-header"><span class="ph-diamond">◆</span> New Message</div>
  <div class="panel-body">
    <form method="POST" action="/compose">
      <label for="sender">Sender</label>
      <input type="text" id="sender" name="sender" placeholder="Alice <alice@example.com>" required>

      <label for="subject" style="margin-top:0.4rem;">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Hello from the WebUI" required>

      <label for="content" style="margin-top:0.4rem;">Message</label>
      <textarea id="content" name="content" rows="8" placeholder="Type your message here…" required></textarea>

      <div class="gap-row" style="margin-top:0.5rem;">
        <button class="btn btn-primary" type="submit">→ Inject to Queue</button>
        <a class="btn" href="/">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
