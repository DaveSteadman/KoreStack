<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoreStack</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico" />
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css" />
  <link rel="stylesheet" href="/static/korefile/style.css" />
  <script src="/suite-config.js"></script>
</head>
<body>

  <div id="topbar"></div>

  <!-- ── Top Bar ───────────────────────────────────────────── -->
  <div id="tab-bar"></div>

  <!-- ── Application Menu Bar ──────────────────────────────── -->
  <div id="app-menu-host"></div>

  <!-- ── Main layout ───────────────────────────────────────── -->
  <div id="kf-layout">

    <!-- Folder tree (left panel) -->
    <aside id="kf-tree-panel" class="kcui-navpanel">
      <div id="kf-tree-header" class="kcui-navpanel-header kcui-panel-header">
        <span>Folders</span>
        <button id="btn-new-folder" class="icon-btn" title="New Folder">
          <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
            <path d="M2 5a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5z" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10" y1="8" x2="10" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="kf-tree" class="kcui-navpanel-tree"></div>
    </aside>

    <!-- Resize handle -->
    <div id="kf-resize-handle"></div>

    <!-- File list (main panel) -->
    <main id="kf-main-panel">
      <div id="kf-breadcrumb"></div>

      <div id="kf-toolbar">
        <button class="kf-tb-btn" id="btn-new-file" title="New File">
          <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
            <path d="M5 2h7l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="12,2 12,6 16,6" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="8" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="10" y1="9" x2="10" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          New File
        </button>
        <button class="kf-tb-btn" id="btn-import-fs" title="Import from flat file storage">
          <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
            <path d="M10 3v10m0 0-3-3m3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 14v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Import FS Files
        </button>
        <div class="kf-tb-sep"></div>
        <input id="kf-search" type="search" placeholder="Search…" autocomplete="off" />
      </div>

      <div id="kf-file-list-wrap">
        <table id="kf-file-list">
          <thead>
            <tr>
              <th class="col-icon"></th>
              <th class="col-name" data-sort="name">Name <span class="sort-arrow"></span></th>
              <th class="col-type" data-sort="ext">Type <span class="sort-arrow"></span></th>
              <th class="col-words" data-sort="word_count">Words <span class="sort-arrow"></span></th>
              <th class="col-modified" data-sort="modified_at">Modified <span class="sort-arrow"></span></th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="kf-file-tbody"></tbody>
        </table>
        <div id="kf-empty">No files in this folder.</div>
        <div id="kf-loading">Loading…</div>
      </div>
    </main>

  </div>

  <!-- ── Dialogs ─────────────────────────────────────────────── -->

  <!-- Generic prompt dialog -->
  <dialog id="dlg-prompt">
    <form method="dialog">
      <h3 id="dlg-prompt-title">Prompt</h3>
      <input id="dlg-prompt-input" type="text" autocomplete="off" />
      <div class="dlg-actions">
        <button type="button" id="dlg-prompt-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" id="dlg-prompt-ok" class="btn-primary">OK</button>
      </div>
    </form>
  </dialog>

  <!-- New file dialog -->
  <dialog id="dlg-new-file">
    <form method="dialog">
      <h3>New File</h3>
      <label>Name</label>
      <input id="new-file-name" type="text" placeholder="my-doc.koredoc" autocomplete="off" />
      <label>Type</label>
      <select id="new-file-type">
        <option value="koredoc">KoreDoc (.koredoc)</option>
        <option value="koresheet">KoreSheet (.koresheet)</option>
        <option value="kodiag">KoreDiag (.kodiag)</option>
      </select>
      <div class="dlg-actions">
        <button type="button" id="new-file-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" id="new-file-ok" class="btn-primary">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Confirm dialog -->
  <dialog id="dlg-confirm">
    <form method="dialog">
      <h3 id="dlg-confirm-title">Confirm</h3>
      <p id="dlg-confirm-msg"></p>
      <div class="dlg-actions">
        <button type="button" id="dlg-confirm-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" id="dlg-confirm-ok" class="btn-danger">Delete</button>
      </div>
    </form>
  </dialog>

  <!-- Move file/folder dialog -->
  <dialog id="dlg-move">
    <form method="dialog">
      <h3 id="dlg-move-title">Move</h3>
      <label>Destination folder</label>
      <select id="move-folder-select"></select>
      <div class="dlg-actions">
        <button type="button" id="move-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" id="move-ok" class="btn-primary">Move</button>
      </div>
    </form>
  </dialog>

  <!-- Context menu -->
  <ul id="ctx-menu">
    <li data-action="open">Open</li>
    <li data-action="rename">Rename</li>
    <li data-action="move">Move to Folder…</li>
    <li class="sep"></li>
    <li data-action="delete" class="danger">Delete</li>
  </ul>

  <script type="module" src="/static/korefile/js/main.js"></script>
</body>
</html>
