<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoreDiag</title>
  <link rel="stylesheet" href="/static/diag/style.css" />
  <link rel="stylesheet" href="/static/commonui/css/chrome.css" />
</head>
<body>

  <div id="topbar"></div>

  <!-- ── Top Bar ───────────────────────────────────────────── -->
  <div id="tab-bar"></div>

  <!-- ── Application Menu Bar ─────────────────────────────── -->
  <div id="app-menu-host"></div>

  <!-- ── Main workspace ───────────────────────────────────── -->
  <div id="workspace">

    <!-- Left tool sidebar -->
    <aside id="tool-sidebar">
      <button class="tool-btn active" data-tool="select" title="Select / Move (V)">
        <svg viewBox="0 0 24 24"><path d="M4 2l16 10-7 1-4 7z"/></svg>
      </button>
      <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="ellipse" title="Ellipse (E)">
        <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="connect" title="Connect (C)">
        <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/><polygon points="20,4 14,6 18,10"/></svg>
      </button>
      <button class="tool-btn" data-tool="waypoint" title="Waypoint (W)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><line x1="2" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="2"/><line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="pan" title="Pan (H)">
        <svg viewBox="0 0 24 24"><path d="M9 11V6a2 2 0 0 1 4 0v5m0 0V5a2 2 0 0 1 4 0v6m0 0v-2a2 2 0 0 1 4 0v5a7 7 0 0 1-14 0v-5a2 2 0 0 1 4 0v2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </aside>

    <!-- Canvas -->
    <main id="canvas-container">
      <canvas id="canvas"></canvas>
      <!-- Floating inline text editor -->
      <textarea id="label-editor" style="display:none"></textarea>
    </main>

    <!-- Right panels -->
    <aside id="right-sidebar">
      <section id="properties-panel">
        <h3 id="props-title">Properties</h3>
        <div id="props-content">
          <p class="hint">Nothing selected</p>
        </div>
      </section>

      <section id="hierarchy-panel">
        <h3>Hierarchy</h3>
        <ul id="hierarchy-tree"></ul>
      </section>
    </aside>

  </div>

  <script type="module" src="/static/diag/js/main.js"></script>
</body>
</html>
