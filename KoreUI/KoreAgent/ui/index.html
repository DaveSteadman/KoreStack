<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoreStack</title>
    <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico">
    <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
    <link rel="stylesheet" href="/ui-elements/assets/css/workspace.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/suite-config.js"></script>
</head>
<body>
<div id="layout">
    <div id="topbar"></div>
    <div id="app-bar"></div>

    <!-- ================================================
         MAIN GRID
         ================================================ -->
    <div
        id="main-grid"
        class="kcui-workspace"
        data-kcui-workspace
        data-kcui-layout-key="koreagent-main-v1"
        data-kcui-columns="0,2,4"
        data-kcui-columns-min="120,80,80"
        data-kcui-rows="0,2"
        data-kcui-rows-min="80,60"
        data-kcui-disable-below="900"
    >

        <!-- Timeline -->
        <div class="panel kcui-panel kcui-panel--column kcui-workspace__region" id="panel-timeline">
            <div class="panel-header kcui-panel-header kcui-panel-header--start">
                Schedule
            </div>
            <div class="panel-body kcui-panel-body kcui-panel-body--fill kcui-panel-body--scroll kcui-panel-body--mono timeline-body">
                <div id="timeline-ticker"></div>
                <div id="timeline-queue"></div>
            </div>
        </div>

        <div
            class="splitter splitter-v kcui-workspace__splitter kcui-workspace__splitter--v"
            id="splitter-v1"
            data-kcui-splitter
            data-kcui-axis="columns"
            data-kcui-before="0"
            data-kcui-after="2"
        ></div>

        <!-- Log stream -->
        <div class="panel kcui-panel kcui-panel--column kcui-workspace__region" id="panel-log">
            <div class="panel-header kcui-panel-header kcui-panel-header--start">
                <span id="log-panel-title">Log</span>
                <span class="kcui-panel-spacer"></span>
                <button class="kcui-tag kcui-tag--dim" id="log-btn-up" type="button">&#x2191;</button>
                <button class="kcui-tag kcui-tag--dim" id="log-btn-down" type="button">&#x2193;</button>
                <button class="kcui-tag kcui-tag--dim is-on" id="log-btn-live" type="button">live</button>
                <button class="kcui-tag kcui-tag--dim" id="wrap-btn-log" type="button">wrap</button>
            </div>
            <div class="panel-body kcui-panel-body kcui-panel-body--fill kcui-panel-body--scroll kcui-panel-body--mono kcui-panel-body--nowrap" id="log-body"></div>
        </div>

        <div
            class="splitter splitter-v kcui-workspace__splitter kcui-workspace__splitter--v"
            id="splitter-v2"
            data-kcui-splitter
            data-kcui-axis="columns"
            data-kcui-before="2"
            data-kcui-after="4"
        ></div>

        <!-- Chat -->
        <div class="panel kcui-panel kcui-panel--column kcui-workspace__region" id="panel-chat">
            <div class="panel-header kcui-panel-header kcui-panel-header--start">
                Chat: <span id="chat-panel-title"></span>
                <span class="kcui-panel-spacer"></span>
                <button class="kcui-tag kcui-tag--dim" id="sandbox-btn" type="button">sandbox</button>
                <button class="kcui-tag kcui-tag--dim" id="webskills-btn" type="button">web</button>
                <button class="kcui-tag kcui-tag--dim" id="direct-btn" type="button">LLM-DIRECT</button>
                <button class="kcui-tag kcui-tag--dim" id="wrap-btn-chat" type="button">wrap</button>
            </div>
            <div class="panel-body kcui-panel-body kcui-panel-body--fill kcui-panel-body--scroll kcui-panel-body--mono kcui-panel-body--nowrap" id="chat-body"></div>
        </div>

        <div
            class="splitter splitter-h kcui-workspace__splitter kcui-workspace__splitter--h"
            id="splitter-h1"
            data-kcui-splitter
            data-kcui-axis="rows"
            data-kcui-before="0"
            data-kcui-after="2"
        ></div>

        <!-- Input bar -->
        <div class="panel kcui-panel kcui-workspace__region" id="panel-input">
            <div class="panel-body kcui-panel-body kcui-panel-body--fill">
                <textarea
                    id="chat-input"
                    rows="2"
                    placeholder="Type a prompt and press Enter (Shift+Enter for newline)..."
                    autocomplete="off"
                    spellcheck="false"
                ></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>

    </div><!-- #main-grid -->
</div><!-- #layout -->

<div id="slash-suggest" hidden></div>

<script type="module">
    import { initAppBar, initTopbar } from '/ui-elements/assets/js/chrome.js';
    import { initWorkspaceLayouts } from '/ui-elements/assets/js/workspace.js';
    initTopbar({ currentService: 'koreagent', urls: window.__koreSuiteUrls || {} });
    initAppBar({
        currentService: 'koreagent',
        overline: 'Agent Control',
        brandLabel: 'KoreAgent',
        brandIcon: 'koreagent',
        chips: [
            { label: 'Host', value: '', valueId: 'ollama-host', tone: 'info' },
            { label: 'Model', value: '', valueId: 'ollama-model', tone: 'info' },
            { label: 'Context', value: '', valueId: 'ollama-ctx', tone: 'info' },
        ],
        actions: [
            { kind: 'tag', id: 'btn-reset-layout', action: 'reset-layout', label: 'Default Layout', className: 'kcui-tag kcui-tag--dim' },
        ],
    });
    initWorkspaceLayouts();
</script>
<script src="/static/app.js?v=14"></script>
</body>
</html>
