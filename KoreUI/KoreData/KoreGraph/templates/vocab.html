{% extends "base.html" %}
{% block title_suffix %} — Vocab{% endblock %}
{% block main_class %}kcui-main{% endblock %}

{% block content %}
<style>
  .kg-vocab-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    align-items: start;
  }
  @media (max-width: 700px) { .kg-vocab-layout { grid-template-columns: 1fr; } }

  /* ── left list ─────────────────────────────────────────────────────── */
  .kg-vocab-left {
    border-right: 1px solid var(--border);
  }
  .vocab-toolbar {
    display: flex; gap: 0.5rem; align-items: center;
    padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border);
  }
  .vocab-toolbar input[type=search] { flex: 1; min-width: 0; }
  .vocab-toolbar select { width: auto; flex-shrink: 0; padding: 0.2rem 0.25rem; font-size: var(--kcui-text-body-sm); }
  .vocab-add-row {
    display: flex; gap: 0.5rem; align-items: center;
    padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .vocab-add-row input[type=text] { flex: 1; }
  .vocab-pager {
    display: flex; gap: 0.5rem; align-items: center;
    padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .vocab-pager .kg-nav-btn {
    width: 1.75rem; height: 1.75rem;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 0.75rem;
    line-height: 1;
  }
  .vocab-pager .v-page-info { flex: 1; text-align: center; }
  .vocab-pager select { padding: 0.2rem 0.3rem; font-size: var(--kcui-text-body-sm); }
  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  .v-word-item {
    display: flex; align-items: baseline; gap: 0.4rem;
    padding: 0.3rem 0.75rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
  }
  .v-word-item:hover { background: var(--hover); }
  .v-word-item.v-selected { background: rgba(74,247,122,.07); }
  .v-concept-num { min-width: 2rem; text-align: right; flex-shrink: 0; }
  .v-term { font-family: var(--font-code); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


  /* ── right panel ───────────────────────────────────────────────────── */
  .kg-vocab-panel {
    display: flex; flex-direction: column; gap: 1rem;
    padding: 1rem;
    border-left: 1px solid var(--border);
    position: sticky; top: 0;
    max-height: 100vh; overflow-y: auto;
  }
  .v-panel-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--dim); font-size: var(--kcui-text-body-sm); text-align: center;
  }
  .v-panel-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  }
  .v-panel-term { font-family: var(--font-code); color: var(--text); word-break: break-all; }
  .v-section-label {
    font-size: var(--kcui-text-label); color: var(--dim);
    letter-spacing: var(--kcui-tracking-label); text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .v-rename-row { display: flex; gap: 0.35rem; margin-top: 0.25rem; }
  .v-rename-row input { flex: 1; font-size: var(--kcui-text-body-sm); padding: 0.25rem 0.4rem; }
  .v-rename-row button { padding: 0.25rem 0.7rem; font-size: var(--kcui-text-label); }
  .v-panel-footer { margin-top: auto; padding-top: 0.75rem; border-top: 1px solid var(--border); }

  /* ── alias tags ──────────────────────────────────────────────────────── */
  .v-alias-tags {
    display: flex; flex-wrap: wrap; gap: 0.3rem;
    margin-top: 0.25rem; min-height: 1.4rem;
  }
  .v-alias-tag {
    display: inline-flex; align-items: center; gap: 0.15rem;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 0.25rem; padding: 0.1rem 0.35rem 0.1rem 0.5rem;
    font-size: var(--kcui-text-body-sm); font-family: var(--font-code);
  }
  .v-alias-tag-x {
    background: none; border: none; cursor: pointer;
    color: var(--dim); padding: 0 0 0 0.2rem;
    font-size: 0.85em; line-height: 1;
  }
  .v-alias-tag-x:hover { color: var(--danger, #f66); }

  /* ── merge autocomplete ──────────────────────────────────────────────── */
  .v-merge-row { display: flex; gap: 0.35rem; margin-top: 0.25rem; position: relative; }
  .v-merge-row input { flex: 1; font-size: var(--kcui-text-body-sm); padding: 0.25rem 0.4rem; }
  .v-merge-row button { padding: 0.25rem 0.7rem; font-size: var(--kcui-text-label); }
  .v-merge-ac {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface, #1a1a1a); border: 1px solid var(--border);
    border-radius: 0.25rem; max-height: 200px; overflow-y: auto;
    z-index: 200; margin-top: 2px;
  }
  .v-merge-ac-item {
    display: flex; align-items: baseline; gap: 0.5rem;
    padding: 0.28rem 0.6rem; cursor: pointer;
    font-size: var(--kcui-text-body-sm);
  }
  .v-merge-ac-item:hover, .v-merge-ac-item.v-ac-sel { background: var(--hover); }
</style>

<div class="kg-vocab-layout">

  <!-- ── left: list ─────────────────────────────────────────────────── -->
  <div class="kg-vocab-left">
    <div class="vocab-toolbar">
      <input type="search" id="v-search" placeholder="Search terms…" autocomplete="off">
      <span id="v-count" class="meta"></span>
      <select id="v-cols-sel" onchange="setCols(this.value)" title="Columns">
        <option value="1">1 col</option>
        <option value="2" selected>2 col</option>
        <option value="3">3 col</option>
      </select>
      <select id="v-page-size-sel" onchange="setPageSize(this.value)" title="Per page">
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="300">300</option>
      </select>
    </div>
    <div class="vocab-add-row" id="v-add-row">
      <input type="text" id="v-add-input" placeholder="New term…"
        onkeydown="if(event.key==='Enter')saveAddTerm()">
      <button onclick="saveAddTerm()">Save</button>
    </div>
    <div class="vocab-pager">
      <button id="v-prev" class="kg-nav-btn" onclick="changePage(-1)" disabled title="Previous">&#x25C2;</button>
      <span class="v-page-info meta" id="v-page-info"></span>
      <button id="v-next" class="kg-nav-btn" onclick="changePage(1)" disabled title="Next">&#x25B8;</button>
    </div>
    <div class="vocab-grid" id="v-grid">
      <div class="meta" style="padding:1rem;text-align:center;grid-column:1/-1">Loading…</div>
    </div>
    <div class="vocab-pager">
      <button id="v-prev2" class="kg-nav-btn" onclick="changePage(-1)" disabled title="Previous">&#x25C2;</button>
      <span class="v-page-info meta" id="v-page-info2"></span>
      <button id="v-next2" class="kg-nav-btn" onclick="changePage(1)" disabled title="Next">&#x25B8;</button>
    </div>
  </div>

  <!-- ── right: detail panel ────────────────────────────────────────── -->
  <div class="kg-vocab-panel" id="v-panel">
    <div class="v-panel-empty">Select a term<br>to view details</div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let _selectedId   = null;
let _selectedTerm = null;
let _mergeMode    = false;
let _terms        = [];
let _page         = 0;
let _pageSize     = 100;
let _cols         = 2;
let _mergeTargetId = null;
let _mergeAcItems  = [];
let _mergeAcIdx    = -1;

// ── Load / render list ──────────────────────────────────────────────────
async function loadVocab(resetPage) {
  if (resetPage) _page = 0;
  const q   = document.getElementById('v-search').value.trim();
  const url = window._kgPfx + '/api/vocab?limit=100000' + (q ? '&q=' + encodeURIComponent(q) : '');
  const r   = await fetch(url);
  _terms = await r.json();
  renderList();
}

function renderList() {
  const grid  = document.getElementById('v-grid');
  const total = _terms.length;
  const pages = Math.max(1, Math.ceil(total / _pageSize));
  if (_page >= pages) _page = pages - 1;
  const start = _page * _pageSize;
  const slice = _terms.slice(start, start + _pageSize);

  document.getElementById('v-count').textContent = total;

  const info = document.getElementById('v-page-info');
  if (total === 0) {
    info.textContent = '0 terms';
  } else {
    const end = Math.min(start + _pageSize, total);
    info.textContent = `${start + 1}\u2013${end} of ${total}`;
  }
  document.getElementById('v-prev').disabled  = (_page === 0);
  document.getElementById('v-next').disabled  = (_page >= pages - 1);
  document.getElementById('v-prev2').disabled = (_page === 0);
  document.getElementById('v-next2').disabled = (_page >= pages - 1);
  document.getElementById('v-page-info2').textContent =
    document.getElementById('v-page-info').textContent;

  grid.style.gridTemplateColumns = `repeat(${_cols}, 1fr)`;
  grid.innerHTML = '';
  if (!slice.length) {
    grid.innerHTML = '<div class="meta" style="padding:1rem;text-align:center;grid-column:1/-1">No terms.</div>';
    return;
  }
  for (const t of slice) {
    const div = document.createElement('div');
    div.className = 'v-word-item';
    div.id = 'vr-' + t.id;
    if (t.id === _selectedId) div.classList.add('v-selected');
    div.innerHTML = `<span class="meta v-concept-num">${t.concept_id}</span><span class="v-term">${escHtml(t.term)}</span>`;
    div.onclick = () => selectTerm(t.id, t.term);
    grid.appendChild(div);
  }
}

function changePage(delta) {
  _page += delta;
  renderList();
}

function setPageSize(val) {
  _pageSize = parseInt(val);
  _page = 0;
  renderList();
}

function setCols(val) {
  _cols = parseInt(val);
  renderList();
}

// ── Select ──────────────────────────────────────────────────────────────
async function selectTerm(id, term) {
  _selectedId   = id;
  _selectedTerm = term;
  _mergeMode    = false;
  renderList();
  const r = await fetch(window._kgPfx + '/api/vocab/' + id);
  if (r.ok) renderPanel(await r.json());
}

function renderPanel(d) {
  const aliases = d.aliases || [];
  const aliasesHtml = aliases.length
    ? aliases.map(a =>
        `<span class="v-alias-tag">${escHtml(a.term)}`
        + `<button class="v-alias-tag-x" title="Split off" onclick="doUnmerge(${a.id})">×</button>`
        + `</span>`
      ).join('')
    : `<span class="meta" style="font-size:var(--kcui-text-body-sm)">None</span>`;

  const splitBtn = aliases.length
    ? `<button onclick="doUnmerge(${d.id})" style="margin-right:0.5rem">Split off</button>`
    : '';

  document.getElementById('v-panel').innerHTML = `
    <div class="v-panel-header">
      <span class="v-panel-term" id="v-panel-term">${escHtml(d.term)}</span>
      <span style="display:flex;align-items:baseline;gap:0.6rem;">
        <span class="meta">concept ${d.concept_id}</span>
        <button onclick="goToGraph(${escHtml(JSON.stringify(d.term))})" style="font-size:var(--kcui-text-label);padding:0.1rem 0.5rem;">to Graph ↗</button>
      </span>
    </div>

    <div>
      <div class="v-section-label">Aliases</div>
      <div class="v-alias-tags" id="v-alias-tags">${aliasesHtml}</div>
    </div>

    <div>
      <div class="v-section-label">Define alias:</div>
      <div class="v-merge-row">
        <input type="text" id="v-merge-input" placeholder="Type alias name to absorb…" autocomplete="off"
          oninput="onMergeInput()" onkeydown="onMergeKey(event,${d.id})">
        <button onclick="doMerge(${d.id})" title="The typed term will become an alias of the selected term">Add alias</button>
        <div class="v-merge-ac" id="v-merge-ac" style="display:none"></div>
      </div>
      <div id="v-merge-msg" class="meta" style="min-height:1.2em;margin-top:0.2rem"></div>
    </div>

    <div>
      <div class="v-section-label">Rename</div>
      <div class="v-rename-row">
        <input type="text" id="v-rename-input" value="${escHtml(d.term)}"
          onkeydown="if(event.key==='Enter')renameVocabTerm(${d.id})">
        <button onclick="renameVocabTerm(${d.id})">Save</button>
      </div>
      <div id="v-rename-msg" class="meta" style="min-height:1.2em;margin-top:0.25rem"></div>
    </div>

    <div class="v-panel-footer">
      ${splitBtn}
      <button class="btn btn-danger"
        onclick="deleteVocabTerm(${d.id}, ${escHtml(JSON.stringify(d.term))})">
        Delete term
      </button>
    </div>
  `;
}

// ── Graph nav ──────────────────────────────────────────────────────────
function goToGraph(term) {
  sessionStorage.setItem('kg-last-term', term);
  sessionStorage.removeItem('kg-last-view');  // new term — let graph reset to centre
  window.location.href = window._kgPfx + '/ui/graph';
}

// ── Rename ─────────────────────────────────────────────────────────────
async function renameVocabTerm(id) {
  const inp    = document.getElementById('v-rename-input');
  const newTerm = inp.value.trim();
  const msg    = document.getElementById('v-rename-msg');
  if (!newTerm) { msg.textContent = 'Enter a new term.'; return; }
  if (newTerm === _selectedTerm) { msg.textContent = 'No change.'; return; }
  const r = await fetch(window._kgPfx + '/api/vocab/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ term: newTerm }),
  });
  if (r.ok) {
    const d = await r.json();
    _selectedTerm = d.term;
    document.getElementById('v-panel-term').textContent = d.term;
    document.getElementById('vr-' + id).querySelector('td:nth-child(2)').textContent = d.term;
    msg.textContent = 'Saved.';
    setTimeout(() => { if (msg) msg.textContent = ''; }, 2000);
  } else {
    const d = await r.json();
    msg.textContent = d.detail || 'Error';
  }
}

// ── Delete term ─────────────────────────────────────────────────────────
async function deleteVocabTerm(id, termText) {
  if (!confirm(`Delete vocab term "${termText}"?`)) return;
  const r = await fetch(window._kgPfx + '/api/vocab/' + id, { method: 'DELETE' });
  if (r.ok) {
    _selectedId = null; _selectedTerm = null;
    document.getElementById('v-panel').innerHTML =
      '<div class="v-panel-empty">Select a term<br>to view details</div>';
    await loadVocab();
  } else {
    const d = await r.json();
    alert(d.detail || 'Error');
  }
}

// ── Add term ────────────────────────────────────────────────────────────
async function saveAddTerm() {
  const inp  = document.getElementById('v-add-input');
  const term = inp.value.trim();
  if (!term) return;
  const r = await fetch(window._kgPfx + '/api/vocab', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ term }),
  });
  if (r.ok) {
    const d = await r.json();
    inp.value = '';
    await loadVocab();
    selectTerm(d.id, d.term);
  } else {
    const d = await r.json();
    alert(d.detail || 'Error');
  }
}

// ── Merge / alias ───────────────────────────────────────────────────────
async function onMergeInput() {
  _mergeTargetId = null;
  const q  = document.getElementById('v-merge-input').value.trim();
  const ac = document.getElementById('v-merge-ac');
  if (!q) { ac.style.display = 'none'; _mergeAcItems = []; return; }
  const r = await fetch(window._kgPfx + '/api/vocab?q=' + encodeURIComponent(q) + '&limit=20');
  const all = await r.json();
  _mergeAcItems = all.filter(x => x.id !== _selectedId).slice(0, 8);
  _mergeAcIdx   = -1;
  renderMergeAC();
}

function renderMergeAC() {
  const ac = document.getElementById('v-merge-ac');
  if (!ac) return;
  if (!_mergeAcItems.length) { ac.style.display = 'none'; return; }
  ac.innerHTML = _mergeAcItems.map((x, i) =>
    `<div class="v-merge-ac-item${i === _mergeAcIdx ? ' v-ac-sel' : ''}"
       onmousedown="selectMergeTarget(${x.id},${escHtml(JSON.stringify(x.term))})">
       <span class="meta" style="min-width:2.5rem;flex-shrink:0">${x.concept_id}</span>${escHtml(x.term)}
     </div>`
  ).join('');
  ac.style.display = 'block';
}

function selectMergeTarget(id, term) {
  _mergeTargetId = id;
  const inp = document.getElementById('v-merge-input');
  if (inp) inp.value = term;
  const ac = document.getElementById('v-merge-ac');
  if (ac) ac.style.display = 'none';
}

function onMergeKey(event, vocabId) {
  if (event.key === 'Enter')  { doMerge(vocabId); return; }
  if (event.key === 'Escape') { const ac = document.getElementById('v-merge-ac'); if (ac) ac.style.display = 'none'; return; }
  if (event.key === 'ArrowDown') {
    _mergeAcIdx = Math.min(_mergeAcIdx + 1, _mergeAcItems.length - 1);
    renderMergeAC(); event.preventDefault();
  }
  if (event.key === 'ArrowUp') {
    _mergeAcIdx = Math.max(_mergeAcIdx - 1, -1);
    renderMergeAC(); event.preventDefault();
  }
}

async function doMerge(vocabId) {
  const msg = document.getElementById('v-merge-msg');
  const q   = (document.getElementById('v-merge-input').value || '').trim();
  if (!q) { msg.textContent = 'Search and select a term to absorb as alias.'; return; }
  let targetId = _mergeTargetId;
  if (!targetId) {
    // Fallback: exact-match search
    const r = await fetch(window._kgPfx + '/api/vocab?q=' + encodeURIComponent(q) + '&limit=50');
    const items = (await r.json()).filter(x => x.term === q && x.id !== vocabId);
    if (!items.length) { msg.textContent = 'Select a term from the list.'; return; }
    targetId = items[0].id;
  }
  if (!confirm(`Add "${q}" as alias of "${_selectedTerm}"?\n\nAll connections for "${q}" will be merged into "${_selectedTerm}".`)) return;
  // targetId (typed term) becomes alias of vocabId (selected definitive term)
  const r = await fetch(window._kgPfx + '/api/vocab/' + targetId + '/merge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ target_id: vocabId }),
  });
  if (r.ok) {
    _mergeTargetId = null;
    await loadVocab();
    // Reload the selected (definitive) term's panel — it now lists the alias
    const rp = await fetch(window._kgPfx + '/api/vocab/' + vocabId);
    if (rp.ok) renderPanel(await rp.json());
  } else {
    const d = await r.json().catch(() => ({}));
    msg.textContent = d.detail || 'Error adding alias';
  }
}

async function doUnmerge(vocabId) {
  const r = await fetch(window._kgPfx + '/api/vocab/' + vocabId + '/merge', { method: 'DELETE' });
  if (r.ok) {
    await loadVocab();
    if (_selectedId) {
      const rp = await fetch(window._kgPfx + '/api/vocab/' + _selectedId);
      if (rp.ok) renderPanel(await rp.json());
    }
  } else {
    const d = await r.json().catch(() => ({}));
    alert(d.detail || 'Error splitting term');
  }
}

// ── Utilities ───────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _searchTimer;
document.getElementById('v-search').addEventListener('input', function () {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => loadVocab(true), 300);
});

loadVocab();
</script>
{% endblock %}
