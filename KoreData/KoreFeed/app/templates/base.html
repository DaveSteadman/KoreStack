<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MiniFeed{% endblock %}</title>
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
  <style>
    :root {
      --bg:      #0b0c10;
      --panel:   #0f1117;
      --border:  #1e2233;
      --text:    #c5c8d0;
      --dim:     #4e5466;
      --green:   #4af77a;
      --amber:   #f0c060;
      --blue:    #6eb5ff;
      --red:     #ff5f5f;
      --header-h: 42px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-ui);
      background: var(--bg); color: var(--text);
      font-size: 13px; line-height: 1.55;
    }

    /* ─── header bar ─────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 1.5rem;
      position: sticky; top: var(--topbar-h, var(--tab-h, 38px)); z-index: 100;
    }
    .logo {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.06em;
      text-decoration: none; flex-shrink: 0;
      color: var(--text);
    }
    .logo .l-mini { color: var(--text); }
    .logo .l-feed { color: var(--green); }

    .dot-live {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      display: inline-block; flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .dot-live.online {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    nav { margin-left: auto; display: flex; gap: 1.25rem; }
    nav a { color: var(--dim); text-decoration: none; font-size: 12px; letter-spacing: 0.04em; }
    nav a:hover { color: var(--text); }

    /* tag badge (header bar) */
    .tag {
      font-size: 11px; letter-spacing: 0.04em;
      padding: 1px 6px; border: 1px solid var(--border); color: var(--dim);
    }

    /* ─── layout ─────────────────────────────────── */
    main { padding: 1.5rem 2rem; max-width: 1320px; margin: 0 auto; }

    /* ─── panel / card ───────────────────────────── */
    .panel.kcui-panel { margin-bottom: 1.25rem; }
    .panel-header.kcui-panel-header {
      justify-content: flex-start;
      gap: 0.6rem;
    }
    .panel-body.kcui-panel-body { padding: 12px; }

    /* ─── two-column layout ──────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    /* ─── domain grid ────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .domain-card {
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.75rem 1rem;
      text-decoration: none; color: var(--text);
      display: block; transition: border-color .12s;
    }
    .domain-card:hover { border-color: var(--green); }
    .domain-card .dc-name { color: var(--green); font-size: 0.95rem; margin-bottom: 0.25rem; }
    .domain-card .dc-count { color: var(--dim); font-size: 11px; }

    /* ─── table ──────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th, td { text-align: left; padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--dim); font-weight: 400; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.025); }

    /* ─── forms ──────────────────────────────────── */
    form { display: flex; flex-direction: column; gap: 0.6rem; }
    label { font-size: 11px; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }
    input[type=text], input[type=url], input[type=number], input[type=search],
    select {
      padding: 0.35rem 0.6rem;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit; font-size: 12.5px; width: 100%; outline: none;
      color-scheme: dark;
    }
    input:focus, select:focus { border-color: var(--green); }
    input::placeholder { color: var(--dim); }

    /* custom number stepper widget */
    .num-stepper {
      display: inline-flex;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .num-stepper input[type=number] {
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 0.25rem 0.4rem;
      -moz-appearance: textfield;
      min-width: 0;
      outline: none;
      text-align: right;
    }
    .num-stepper input[type=number]::-webkit-inner-spin-button,
    .num-stepper input[type=number]::-webkit-outer-spin-button { display: none; }
    .num-stepper:focus-within { border-color: var(--green); }
    .stepper-btns {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      width: 20px;
      flex-shrink: 0;
    }
    .stepper-btns button {
      flex: 1;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      font-size: 8px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      transition: background .1s, color .1s;
    }
    .stepper-btns button:first-child { border-bottom: 1px solid var(--border); }
    .stepper-btns button:hover { background: rgba(74,247,122,.15); color: var(--green); }
    /* inline rate-input specifics — transparent border until hover */
    .rate-stepper { border-color: transparent; transition: border-color .15s; }
    .rate-stepper:hover, .rate-stepper:focus-within { border-color: var(--border); }
    .rate-stepper input[type=number] { width: 52px; }
    /* age sub-panels */
    .age-subpanel { padding: 0.6rem 0 0 0; }
    .age-subpanel p.meta { margin-bottom: 0.5rem; }
    button, .btn {
      padding: 0.4rem 1rem;
      background: transparent; color: var(--green);
      border: 1px solid var(--green);
      font-family: inherit; font-size: 12px; cursor: pointer;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background .12s;
    }
    button:hover, .btn:hover { background: rgba(74,247,122,.1); }
    .btn-danger { color: var(--red); border-color: var(--red); }
    .btn-danger:hover { background: rgba(255,95,95,.1); }
    .btn-sm { padding: 0.2rem 0.5rem; font-size: 11px; }

    /* ─── misc ───────────────────────────────────── */
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--text); }
    h1 { font-size: 1.1rem; color: var(--text); margin-bottom: 1.1rem; letter-spacing: 0.04em; }
    h2 { font-size: 0.85rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.7rem; }
    .badge {
      display: inline-block;
      border: 1px solid var(--green); color: var(--green);
      padding: 0px 5px; font-size: 11px; letter-spacing: 0.04em;
    }
    .badge-dim {
      border-color: var(--border); color: var(--dim);
    }
    .meta { color: var(--dim); font-size: 12px; }
    .kv { display: flex; gap: 0.75rem; }
    .kv-key { color: var(--dim); min-width: 120px; }
    .kv-val { color: var(--text); }

    .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; }
    .pagination a {
      padding: 0.25rem 0.65rem; border: 1px solid var(--border); color: var(--dim);
      text-decoration: none; font-size: 12px;
    }
    .pagination a:hover { border-color: var(--green); color: var(--green); }
    .pagination .pg-info { color: var(--dim); font-size: 12px; }

    pre {
      white-space: pre-wrap; word-break: break-word;
      background: var(--bg); padding: 1rem;
      border: 1px solid var(--border);
      font-size: 12px; line-height: 1.65; color: var(--text);
    }

    /* breadcrumb */
    .breadcrumb { color: var(--dim); font-size: 12px; margin-bottom: 1rem; }
    .breadcrumb a { color: var(--dim); }
    .breadcrumb a:hover { color: var(--text); text-decoration: none; }
    .breadcrumb .sep { margin: 0 0.4rem; }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="app-bar"></div>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
  <script>
  (function () {
    function boot() {
      const dot = document.getElementById('hdr-dot');
      if (!dot) {
        requestAnimationFrame(boot);
        return;
      }
      if (sessionStorage.getItem('kd-online') === '1') {
        dot.classList.add('online'); dot.title = 'connected';
      }
      function checkStatus() {
        fetch('/status', { cache: 'no-store' })
          .then(r => {
            if (r.ok) { dot.classList.add('online'); dot.title = 'connected'; sessionStorage.setItem('kd-online', '1'); }
            else      { dot.classList.remove('online'); dot.title = 'error ' + r.status; sessionStorage.removeItem('kd-online'); }
          })
          .catch(() => { dot.classList.remove('online'); dot.title = 'disconnected'; sessionStorage.removeItem('kd-online'); });
      }
      checkStatus();
      setInterval(checkStatus, 15000);
    }
    boot();
  })();
  </script>
  <script type="module">
    import { initAppBar, initTopbar } from '/ui-elements/assets/js/chrome.js?v=20260501a';
    initTopbar({ currentService: 'koredata' });
    initAppBar({
      currentService: 'koredata',
      overline: 'Feed Worker',
      brandLabel: 'KoreFeed',
      brandIcon: 'koredata',
      statusDot: { id: 'hdr-dot', className: 'dot-live', title: 'checking...' },
      chips: [
        { label: 'Role', value: 'RSS Ingest' },
      ],
      tabs: [
        { label: 'Home', href: '/', active: true },
        { label: 'Readme', href: '/web/readme' },
        { label: 'API Docs', href: '/api/docs', target: '_blank', rel: 'noopener' },
      ],
    });
  </script>
</body>
</html>
