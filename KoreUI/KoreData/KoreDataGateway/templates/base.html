<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KoreStack{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
  <link rel="stylesheet" href="/ui-elements/assets/css/koredata-shell.css">
  <script src="/suite-config.js"></script>
</head>
<body class="kcui-shell-bg">
  <div id="topbar"></div>
  <div id="app-bar"></div>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
  function stepNum(btn, delta) {
    const input = btn.closest('.num-stepper').querySelector('input[type=number]');
    const min  = input.min  !== '' ? parseInt(input.min,  10) : -Infinity;
    const max  = input.max  !== '' ? parseInt(input.max,  10) :  Infinity;
    const step = input.step !== '' ? parseInt(input.step, 10) : 1;
    let val = parseInt(input.value, 10);
    if (isNaN(val)) val = parseInt(input.min, 10) || 1;
    input.value = Math.min(max, Math.max(min, val + delta * step));
    input.dispatchEvent(new Event('input', { bubbles: true }));
    if (input.classList.contains('rate-input') && typeof saveRate === 'function') saveRate(input);
  }
  function setNoOlderThan(input) {
    const days = parseInt(input.value, 10);
    if (isNaN(days) || days < 1) return;
    const d = new Date();
    d.setDate(d.getDate() - days);
    const form = input.closest('form');
    if (form) form.querySelector('[name=since]').value = d.toISOString().slice(0, 10);
  }
  </script>
  <script type="module">
    import { initKoreDataShell } from '/ui-elements/assets/js/chrome.js';

    initKoreDataShell({
      path: {{ request.url.path | tojson }},
      urls: window.__koreSuiteUrls || {},
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
