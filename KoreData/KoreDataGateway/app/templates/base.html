<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KoreStack{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
  <script src="/suite-config.js"></script>
  <style>
    .kcui-panel.kcui-panel {
      margin-bottom: 1.25rem;
    }

    .kcui-panel-header.kcui-panel-header {
      justify-content: flex-start;
      gap: 0.6rem;
    }

    .kcui-panel-body.kcui-panel-body {
      padding: 12px;
    }

    .kg-alert {
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel, #1f2430) 88%, black 12%);
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }

    .kg-alert--error {
      border-color: var(--red);
      background: color-mix(in srgb, rgba(255,95,95,0.16) 70%, var(--panel, #1f2430) 30%);
      color: var(--text);
    }

    .kg-alert--warn {
      border-color: var(--amber);
      background: color-mix(in srgb, rgba(255,210,90,0.12) 70%, var(--panel, #1f2430) 30%);
      color: var(--text);
    }

    .kg-alert-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--dim);
    }

    .kg-inline-meta {
      font-size: 11px;
      color: var(--dim);
    }
  </style>
</head>
<body class="kcui-shell-bg">
  <div id="topbar"></div>
  <div id="app-bar"></div>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
  function stepNum(btn, delta) {
    const input = btn.closest('.num-stepper').querySelector('input[type=number]');
    const min  = input.min  !== '' ? parseInt(input.min,  10) : -Infinity;
    const max  = input.max  !== '' ? parseInt(input.max,  10) :  Infinity;
    const step = input.step !== '' ? parseInt(input.step, 10) : 1;
    let val = parseInt(input.value, 10);
    if (isNaN(val)) val = parseInt(input.min, 10) || 1;
    input.value = Math.min(max, Math.max(min, val + delta * step));
    input.dispatchEvent(new Event('input', { bubbles: true }));
    if (input.classList.contains('rate-input') && typeof saveRate === 'function') saveRate(input);
  }
  function setNoOlderThan(input) {
    const days = parseInt(input.value, 10);
    if (isNaN(days) || days < 1) return;
    const d = new Date();
    d.setDate(d.getDate() - days);
    const form = input.closest('form');
    if (form) form.querySelector('[name=since]').value = d.toISOString().slice(0, 10);
  }
  </script>
  <script type="module">
    import { initAppBar, initTopbar } from '/ui-elements/assets/js/chrome.js';

    const path = {{ request.url.path | tojson }};

    const shellMeta = {
      home:      { brandLabel: 'KoreData',      overline: 'Data Gateway',    brandIcon: 'koredata' },
      feeds:     { brandLabel: 'KoreFeed',      overline: 'News Feeds',      brandIcon: 'korefeed' },
      library:   { brandLabel: 'KoreLibrary',   overline: 'Books',           brandIcon: 'korelibrary' },
      reference: { brandLabel: 'KoreReference', overline: 'Reference',       brandIcon: 'korereference' },
      rag:       { brandLabel: 'KoreRAG',       overline: 'RAG Chunks',      brandIcon: 'korerag' },
      scrape:    { brandLabel: 'KoreScrape',    overline: 'Web Snapshots',   brandIcon: 'korescrape' },
      graph:     { brandLabel: 'KoreGraph',     overline: 'Knowledge Graph', brandIcon: 'koregraph' },
    };

    const shellTabs = [
      { key: 'home',      label: 'Home',      href: '/' },
      { key: 'feeds',     label: 'Feeds',     href: '/ui/feeds' },
      { key: 'library',   label: 'Library',   href: '/ui/library' },
      { key: 'reference', label: 'Reference', href: '/ui/reference' },
      { key: 'rag',       label: 'RAG',       href: '/ui/rag/databases' },
      { key: 'scrape',    label: 'Scrape',    href: '/ui/scrape' },
      { key: 'graph',     label: 'Graph',     href: '/graph/' },
    ];

    const section = path.startsWith('/ui/feeds')     ? 'feeds'
                  : path.startsWith('/ui/library')   ? 'library'
                  : path.startsWith('/ui/reference') ? 'reference'
                  : path.startsWith('/ui/rag')       ? 'rag'
                  : path.startsWith('/ui/scrape')    ? 'scrape'
                  : path.startsWith('/graph')        ? 'graph'
                  : 'home';

    initTopbar({ currentService: 'koredata', urls: window.__koreSuiteUrls || {} });
    initAppBar({
      currentService: 'koredata',
      ...shellMeta[section],
      chips: [],
      tabs: shellTabs.map((tab) => ({ ...tab, active: tab.key === section })),
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
