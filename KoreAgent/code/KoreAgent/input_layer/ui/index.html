<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoreAgent</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="layout">
    <div id="topbar"></div>
    <div id="app-bar"></div>

    <!-- ================================================
         MAIN GRID
         ================================================ -->
    <div id="main-grid">

        <!-- Timeline -->
        <div class="panel" id="panel-timeline">
            <div class="panel-header">
                <div class="dot"></div>
                Schedule
            </div>
            <div id="timeline-ticker"></div>
            <div id="timeline-queue"></div>
        </div>

        <div class="splitter splitter-v" id="splitter-v1"></div>

        <!-- Log stream -->
        <div class="panel" id="panel-log">
            <div class="panel-header">
                <div class="dot"></div>
                <span id="log-panel-title">Log</span>
                <span class="header-spacer"></span>
                <button class="wrap-btn" id="log-btn-up"   onclick="logNavStep(-1)">&#x2191;</button>
                <button class="wrap-btn" id="log-btn-down" onclick="logNavStep(+1)">&#x2193;</button>
                <button class="wrap-btn wrap-active" id="log-btn-live" onclick="toggleLogLive()">live</button>
                <button class="wrap-btn" id="wrap-btn-log" onclick="toggleWrap('log-body','wrap-btn-log')">wrap</button>
            </div>
            <div class="panel-body nowrap" id="log-body"></div>
        </div>

        <div class="splitter splitter-v" id="splitter-v2"></div>

        <!-- Chat -->
        <div class="panel" id="panel-chat">
            <div class="panel-header">
                <div class="dot"></div>
                Chat: <span id="chat-panel-title"></span>
                <span class="header-spacer"></span>
                <button class="wrap-btn" id="sandbox-btn" onclick="toggleSandbox()">sandbox</button>
                <button class="wrap-btn" id="webskills-btn" onclick="toggleWebSkills()">web</button>
                <button class="wrap-btn" id="wrap-btn-chat" onclick="toggleWrap('chat-body','wrap-btn-chat')">wrap</button>
            </div>
            <div class="panel-body nowrap" id="chat-body"></div>
        </div>

        <div class="splitter splitter-h" id="splitter-h1"></div>

        <!-- Input bar -->
        <div class="panel" id="panel-input">
            <div class="panel-body">
                <textarea
                    id="chat-input"
                    rows="2"
                    placeholder="Type a prompt and press Enter (Shift+Enter for newline)..."
                    autocomplete="off"
                    spellcheck="false"
                ></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>

    </div><!-- #main-grid -->
</div><!-- #layout -->

<div id="slash-suggest" hidden></div>

<script type="module">
    import { initAppBar, initTopbar } from '/ui-elements/assets/js/chrome.js';
    initTopbar({ currentService: 'koreagent' });
    initAppBar({
        currentService: 'koreagent',
        overline: 'Agent Control',
        brandLabel: 'KoreAgent',
        brandIcon: 'koreagent',
        statusDot: { id: 'ollama-dot', className: 'off', title: 'Model backend status' },
        chips: [
            { label: 'Host', value: '', valueId: 'ollama-host' },
            { label: 'Model', value: '', valueId: 'ollama-model' },
            { label: 'Context', value: '', valueId: 'ollama-ctx' },
        ],
        actionsHtml: `
            <button class="kappbar-button" id="btn-reset-layout" onclick="resetLayout()">Default Layout</button>
            <a class="kappbar-button" href="/README.md" target="_blank" rel="noopener noreferrer">Readme</a>
        `,
    });
</script>
<script src="/static/app.js?v=13"></script>
</body>
</html>
