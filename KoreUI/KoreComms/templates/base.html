<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoreStack</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
  <script src="/suite-config.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="kcui-shell-bg">
<div id="topbar"></div>
<div id="app-bar"></div>
<main class="{% block main_class %}{% endblock %}">
  {% block content %}{% endblock %}
</main>
<script type="module">
  import { bindConfirmActions, bindNumberStepperPairControls, initKoreCommsShell, installNumberStepperGlobals } from '/ui-elements/assets/js/chrome.js';

  bindConfirmActions();
  installNumberStepperGlobals();
  bindNumberStepperPairControls();

  initKoreCommsShell({
    path: {{ request.url.path | tojson }},
    urls: window.__koreSuiteUrls || {},
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
