<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoreAgent Skills Catalog</title>

    <link rel="stylesheet" href="/ui-elements/assets/css/theme.css" />
    <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css" />
    <link rel="stylesheet" href="/ui-elements/assets/css/panels.css" />
    <link rel="stylesheet" href="/ui-elements/assets/css/typography.css" />
    <link rel="stylesheet" href="/ui-elements/assets/css/workspace.css" />
    <link rel="stylesheet" href="/ui-elements/assets/css/forms.css" />
    <link rel="stylesheet" href="/static/skills_catalog.css" />

    <script src="/suite-config.js"></script>
</head>
<body class="kcui-shell-bg">
    <div id="layout" class="kcui-layout-shell">
        <div id="topbar"></div>
        <header id="app-bar" class="kcui-appbar">
            <button id="btn-back" class="kcui-btn kcui-btn--ghost" type="button">Back to KoreAgent</button>
            <div id="stats" class="stats"></div>
            <button id="btn-refresh" class="kcui-btn" type="button">Refresh</button>
        </header>

        <main id="catalog-shell" class="kcui-main kcui-workspace kcui-workspace--stack-sm">
            <aside id="tool-list-panel" class="kcui-panel kcui-panel--column kcui-workspace__region">
                <div class="kcui-panel-header kcui-panel-header--start">
                    <span>All Skill Functions</span>
                    <span class="kcui-panel-spacer"></span>
                    <span id="tool-total" class="kcui-tag kcui-tag--dim">Total:0</span>
                </div>
                <div class="kcui-panel-body">
                    <input id="tool-filter" class="kcui-input" type="text" placeholder="Filter by function/provider" />
                </div>
                <div id="tool-list" class="tool-list kcui-panel-body"></div>
            </aside>

            <section id="details-panel" class="kcui-panel kcui-panel--column kcui-workspace__region">
                <div class="kcui-panel-header kcui-panel-header--start detail-header">
                    <span id="detail-title" class="detail-title">Select a skill function</span>
                    <span id="detail-tags" class="detail-tags"></span>
                </div>
                <div class="kcui-panel-body details-body">
                    <div id="detail-signature" class="detail-signature kcui-type-code"></div>
                    <div id="detail-meta" class="detail-meta"></div>
                    <div class="section-title">Parameters</div>
                    <pre id="detail-schema" class="schema-view kcui-type-code">Select a function to inspect parameters.</pre>

                    <div class="source-actions">
                        <button id="btn-load-module" class="kcui-btn kcui-btn-sm" type="button">Load .py</button>
                        <button id="btn-load-skillmd" class="kcui-btn kcui-btn-sm" type="button">Load skill.md</button>
                    </div>
                    <pre id="source-view" class="source-view kcui-type-code">Select a function to inspect source.</pre>

                    <div class="section-title">Invoke Function</div>
                    <div id="invoke-note" class="invoke-note"></div>
                    <textarea id="invoke-args" class="invoke-args kcui-input kcui-type-code" spellcheck="false" rows="1">{}</textarea>
                    <div class="invoke-actions">
                        <button id="btn-run" class="kcui-btn" type="button">Run</button>
                        <button id="btn-pretty" class="kcui-btn kcui-btn-sm" type="button">Format JSON</button>
                    </div>
                    <pre id="invoke-result" class="result-view kcui-type-code">Run a function to view result.</pre>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/skills_catalog.js"></script>
    <script type="module">
        import { initTopbar } from '/ui-elements/assets/js/chrome.js';

        initTopbar({ currentService: 'koreagent', urls: window.__koreSuiteUrls || {} });
    </script>
</body>
</html>
