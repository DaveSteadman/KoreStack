<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KoreStack{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css">
  <link rel="stylesheet" href="/ui-elements/assets/css/koredata-shell.css">
  <script src="/suite-config.js"></script>
</head>
<body class="kcui-shell-bg">
  <div id="topbar"></div>
  <div id="app-bar"></div>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script type="module">
    import { bindNavigateSelects, bindNumberStepperPairControls, initDialogHost, initKoreDataShell, installDateShortcutGlobals, installNumberStepperGlobals } from '/ui-elements/assets/js/chrome.js';

    initDialogHost();
    installNumberStepperGlobals();
    installDateShortcutGlobals();
    bindNumberStepperPairControls();
    bindNavigateSelects();

    initKoreDataShell({
      path: {{ request.url.path | tojson }},
      urls: window.__koreSuiteUrls || {},
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
