<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoreStack</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico" />
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css" />
  <link rel="stylesheet" href="/ui-elements/assets/css/panels.css" />
  <link rel="stylesheet" href="/static/code/css/base.css" />
  <link rel="stylesheet" href="/static/code/css/explorer.css" />
  <link rel="stylesheet" href="/static/code/css/find.css" />
  <link rel="stylesheet" href="/static/code/css/editor.css" />
  <link rel="stylesheet" href="/static/code/css/chat.css" />
  <script src="/suite-config.js"></script>
</head>
<body>
  <div id="topbar"></div>
  <div id="app-bar"></div>
  <main id="code-app" class="kcui-panels">
    <aside id="code-sidebar" class="kcui-panel-left kcui-navpanel">
      <div class="panel-header kcui-navpanel-header kcui-panel-header">
        <div class="explorer-titlebar">
          <div class="explorer-heading">
            <div class="panel-kicker explorer-panel-title">Explorer</div>
          </div>
          <button id="btn-refresh-tree" class="kcui-tag kcui-tag--muted" type="button" title="Refresh explorer" aria-label="Refresh explorer">&#x21bb;</button>
        </div>
        <div id="explorer-controls">
          <select id="root-select" class="kcui-tag kcui-tag--muted" title="Select development root" aria-label="Select development root"></select>
        </div>
      </div>
      <div id="tree-status" class="panel-status kcui-navpanel-status">Loading workspace…</div>
      <div id="code-tree" class="kcui-navpanel-tree" aria-label="File explorer"></div>
    </aside>
    <div id="code-splitter" class="kcui-splitter" aria-hidden="true"></div>
    <section id="code-main" class="kcui-panel-right">
      <div id="editor-toolbar">
        <div id="file-breadcrumb">No file selected</div>
        <div id="file-state" class="kcui-tag kcui-tag--dim">Read/write editor</div>
        <div id="editor-actions">
          <button id="btn-find" class="kcui-tag kcui-tag--dim" type="button">Find</button>
          <button id="btn-save" class="kcui-tag kcui-tag--dim" type="button">Save</button>
          <button id="btn-wrap" class="kcui-tag kcui-tag--dim" type="button" title="Toggle line wrap">Wrap</button>
          <button id="btn-ai" class="kcui-tag kcui-tag--dim" type="button" title="Toggle AI chat (Alt+A)">AI</button>
        </div>
      </div>
      <div id="editor-body">
        <div id="editor-surface">
          <div id="editor-findbar" hidden>
            <label for="find-input">Find</label>
            <input id="find-input" type="text" autocomplete="off" spellcheck="false" placeholder="Search in file" />
            <button id="btn-find-prev" class="toolbar-btn" type="button">Prev</button>
            <button id="btn-find-next" class="toolbar-btn" type="button">Next</button>
            <button id="btn-find-close" class="toolbar-btn" type="button">Close</button>
          </div>
          <div id="editor-empty">
            <h1>No file open</h1>
            <p>Select a file from the explorer to enable the editor toolbar and start editing.</p>
          </div>
          <div id="editor-host"></div>
        </div>
        <div id="chat-splitter" aria-hidden="true"></div>
        <div id="chat-panel" hidden>
          <div id="chat-toolbar">
            <button id="btn-chat-retry" class="kcui-tag kcui-tag--muted" type="button" title="Regenerate last response">Retry</button>
            <button id="btn-chat-clear" class="kcui-tag kcui-tag--muted" type="button" title="Clear current file thread">Clear</button>
            <button id="btn-workspace-context" class="kcui-tag kcui-tag--accent" type="button" title="Toggle cross-file workspace context" aria-pressed="true">Workspace: On</button>
            <button id="btn-chat-stop" class="kcui-tag kcui-tag--warning" type="button" title="Stop generation" hidden>Stop</button>
          </div>
          <div id="chat-linked-conversation" hidden>
            <span class="chat-linked-label">Linked chat</span>
            <span id="chat-linked-conversation-name"></span>
          </div>
          <div id="chat-progress-note" hidden>Generating...</div>
          <div id="chat-thread"></div>
          <div id="chat-composer">
            <div id="chat-selection-chip" hidden>
              <span id="chat-selection-label"></span>
            </div>
            <div id="chat-slash-suggestions" hidden></div>
            <div id="chat-input-row">
              <textarea id="chat-input" rows="2" placeholder="Ask, use /commands, or reference files with @path… (Enter to send)" autocomplete="off" spellcheck="false"></textarea>
              <button id="btn-chat-send" class="toolbar-btn toolbar-btn-primary" type="button">Send</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="/static/code/js/main.js"></script>
</body>
</html>
