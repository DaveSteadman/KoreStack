<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextEdit - KoreDocs</title>
  <link rel="icon" type="image/x-icon" href="/ui-elements/assets/icons/favicon.ico" />
  <link rel="stylesheet" href="/ui-elements/assets/css/chrome.css" />
  <link rel="stylesheet" href="/static/textedit/style.css" />
  <script src="/suite-config.js"></script>
</head>
<body>
  <div id="topbar"></div>
  <div id="tab-bar"></div>
  <div id="app-menu-host"></div>

  <main id="te-main" class="kcui-shell-bg">
    <section id="te-toolbar" class="kcui-panel">
      <label for="te-target" class="te-label">File</label>
      <input id="te-target" type="text" placeholder="No file loaded" readonly />
      <div class="te-actions">
        <button id="te-open" type="button" class="btn btn-sm btn-secondary">REFRESH</button>
        <button id="te-save" type="button" class="btn btn-sm te-btn-success" disabled>SAVE</button>
      </div>
      <span id="te-status" aria-live="polite"></span>
    </section>

    <textarea id="te-editor" spellcheck="false" placeholder="Open a file to inspect plain text markup..."></textarea>
  </main>

  <script type="module" src="/static/textedit/js/main.js"></script>
</body>
</html>
